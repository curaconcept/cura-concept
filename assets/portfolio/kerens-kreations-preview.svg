  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#r)"/>
  <rect width="1600" height="900" filter="url(#n)" opacity="0.28"/>
  <g fill="#fff" fill-opacity="0.65">
    <text x="72" y="110" font-size="40" font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="3">KERENS KREATION'S</text>
